<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>영화 예매</title><link rel="stylesheet" href="css/style.css"></head><body>

<section class="section"><div class="container"><div class="section-title"><div><h2>좌석 선택</h2><p>영화와 시간, 좌석을 선택하면 오른쪽 예매 정보가 실시간으로 업데이트됩니다.</p></div></div><div class="booking-layout"><div class="booking-main"><h3>영화와 시간 선택</h3><div class="form-row"><div class="form-group"><label>영화</label><select id="movie-select"></select></div><div class="form-group"><label>극장</label><select id="theater-select"></select></div></div><div class="time-list" id="time-list"></div><div class="screen">SCREEN</div><div class="seat-area" id="seat-area"></div><div class="legend"><span><i></i>선택 가능</span><span><i class="selected"></i>선택 좌석</span><span><i class="reserved"></i>예매 완료</span></div></div><aside class="booking-side"><h3>예매 정보</h3><ul class="summary"><li><span>영화</span><strong id="summary-movie" style="font-size:16px;color:#222"></strong></li><li><span>극장</span><span id="summary-theater"></span></li><li><span>시간</span><span id="summary-time"></span></li><li><span>좌석</span><span id="summary-seats">-</span></li><li><span>인원</span><span id="summary-count">0명</span></li><li><span>결제금액</span><strong id="summary-price">0원</strong></li></ul><button id="submit-booking" class="btn primary" style="width:100%;margin-top:18px;">예매하기</button></aside></div></div></section>
