<section class="section"><div class="container"><div class="section-title"><div><h2>관리자 영화 관리</h2><p>form, table, Flex 레이아웃 복습 화면</p></div></div><div class="notice-box">등록/수정/삭제는 브라우저의 localStorage에 저장됩니다. 새로고침해도 유지되지만, 다른 브라우저와는 공유되지 않습니다.</div><div class="admin-layout"><aside class="admin-form"><h3 style="margin-bottom:18px;">영화 등록</h3><form id="admin-form"><div class="form-group"><label>영화 제목</label><input type="text" id="admin-title" placeholder="영화 제목"></div><div class="form-group"><label>장르</label><select id="admin-genre"><option>SF</option><option>애니</option><option>스릴러</option><option>음악</option><option>드라마</option><option>액션</option></select></div><div class="form-group"><label>상영시간</label><input type="text" id="admin-duration" placeholder="예: 128"></div><div class="form-group"><label>관람등급</label><input type="text" id="admin-rating" placeholder="예: 12세 관람가"></div><div class="form-group"><label>줄거리</label><textarea id="admin-story" placeholder="줄거리 입력"></textarea></div><button class="btn primary" id="admin-submit" type="button" style="width:100%;">등록</button></form></aside><div class="admin-table table-wrap"><table><thead><tr><th>번호</th><th>제목</th><th>장르</th><th>상영시간</th><th>등급</th><th>관리</th></tr></thead><tbody id="admin-list"></tbody></table></div></div></div></section>
<footer class="footer"><div class="container">Cinema 예매 사이트 HTML/CSS 실습</div></footer>
